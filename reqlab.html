  // ------------------------------------------------------------ tone pills
  var ok = { background: '#e7f6ee', color: '#177a52' };

  // ------------------------------------------------------ estatística real
  function mean(a) { var s = 0, i; for (i = 0; i < a.length; i++) s += a[i]; return a.length ? s / a.length : 0; }
  function sd(a) { if (a.length < 2) return 0; var m = mean(a), s = 0, i; for (i = 0; i < a.length; i++) s += (a[i] - m) * (a[i] - m); return Math.sqrt(s / (a.length - 1)); }
  function fmt(n, dgt) { if (n == null || isNaN(n)) return '—'; var p = Math.pow(10, dgt); return (Math.round(n * p) / p).toFixed(dgt).replace('.', ','); }
  function lgamma(x) {
    var c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
    var y = x, t = x + 5.5, j; t -= (x + 0.5) * Math.log(t);
    var s = 1.000000000190015; for (j = 0; j < 6; j++) { y++; s += c[j] / y; }
    return -t + Math.log(2.5066282746310005 * s / x);
  }
  function betacf(a, b, x) {
    var MAXIT = 200, EPS = 3e-12, FPMIN = 1e-300;
    var qab = a + b, qap = a + 1, qam = a - 1, c = 1, d = 1 - qab * x / qap, m, m2, aa, del, h;
    if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d; h = d;
    for (m = 1; m <= MAXIT; m++) {
      m2 = 2 * m; aa = m * (b - m) * x / ((qam + m2) * (a + m2));
      d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN; c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN; d = 1 / d; h *= d * c;
      aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
      d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN; c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN; d = 1 / d; del = d * c; h *= del;
      if (Math.abs(del - 1) < EPS) break;
    }
    return h;
  }
  function ibeta(x, a, b) {
    if (x <= 0) return 0; if (x >= 1) return 1;
    var bt = Math.exp(lgamma(a + b) - lgamma(a) - lgamma(b) + a * Math.log(x) + b * Math.log(1 - x));
    if (x < (a + 1) / (a + b + 2)) return bt * betacf(a, b, x) / a;
    return 1 - bt * betacf(b, a, 1 - x) / b;
  }
  // ANOVA de uma via -> { F, p, df1, df2 }
  function anova(groups) {
    var k = groups.length, N = 0, grand = 0, ssb = 0, ssw = 0;
    groups.forEach(function (g) { g.forEach(function (v) { N++; grand += v; }); });
    if (k < 2 || N <= k) return { F: 0, p: 1, df1: 0, df2: 0 };
    grand /= N;
    groups.forEach(function (g) { var m = mean(g); ssb += g.length * (m - grand) * (m - grand); g.forEach(function (v) { ssw += (v - m) * (v - m); }); });
    var df1 = k - 1, df2 = N - k, msb = ssb / df1, msw = ssw / df2;
    var F = msw > 0 ? msb / msw : 0;
    var p = (df2 > 0 && F > 0) ? ibeta(df2 / (df2 + df1 * F), df2 / 2, df1 / 2) : 1;
    return { F: F, p: p, df1: df1, df2: df2 };
  }
  // formatação condicional dirigida pela config da variável
  function classify(v, varc) {
    if (v == null || !varc || varc.faixa_min == null || varc.faixa_max == null) return ok;
    var lo = Number(varc.faixa_min), hi = Number(varc.faixa_max), span = hi - lo;
    if (v >= lo && v <= hi) return ok;
    if (v >= lo - 0.5 * span && v <= hi + 0.5 * span) return warn;
    return crit;
  }
  function toneName(t) { return t === crit ? 'crit' : (t === warn ? 'warn' : 'ok'); }

  };

  var logo = '<div style="display:flex; align-items:center; gap:10px;">' +

    }).join('');
    var pend = d.tPend.map(function (t) {

    }).join('');
    return '<div>' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Bom dia, Marina.</h2><div style="font-size:13px; color:#6b7585;">Efeito de eCG e GnRH na dinâmica folicular de éguas · Doutorado</div></div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:18px 20px; margin-bottom:14px;">' +
        '<div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px;"><div><div style="font-size:11.5px; color:#8a93a0; font-weight:600; text-transform:uppercase; letter-spacing:0.05em;">Progresso do experimento</div><div style="font-size:15px; font-weight:600; margin-top:3px;">Coletas 5 de 8 · etapa D6 concluída</div></div><div style="font:600 30px/1 \'IBM Plex Mono\',monospace; color:#2f63d6;">62%</div></div>' +

      '</div>' +
      '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px;">' +

  // ------------------------------------------------ screen: visão (orientador)
  function visaoOrientador() {
    var rows = d.researches.map(function (r) {

        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Próxima coleta</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">2 dias</div><div style="font-size:11px; color:#7a8492;">D8 · 25 jun</div></div>' +

  // ------------------------------------------------------------ screen: dados
  function dados() {
    var f = state.dataFiltro || 'Todos';
    var displayed = (f === 'Todos') ? d.allDataRows : d.allDataRows.filter(function (r) { return r.grupo === f; });
    var rows = displayed.map(function (r) {
      return '<tr style="border-top:1px solid #f0f3f6;"><td style="padding:10px 16px; font-family:\'IBM Plex Sans\',sans-serif; font-weight:600;">' + r.animal + '</td><td style="padding:10px 12px; color:#566071;">' + r.grupo + '</td><td style="padding:10px 12px; color:#8a93a0;">' + r.dia + '</td><td style="padding:10px 12px;">' + r.diam + '</td><td style="padding:10px 12px;"><span style="' + r.ps + '">' + r.prog + '</span></td><td style="padding:10px 16px;"><span style="font:600 11px \'IBM Plex Sans\',sans-serif; padding:3px 9px; border-radius:5px; background:' + r.ovStyle.background + '; color:' + r.ovStyle.color + ';">' + r.ovul + '</span></td></tr>';

    if (!rows) rows = '<tr><td colspan="6" style="padding:18px 16px; text-align:center; color:#9aa3b0; font-family:\'IBM Plex Sans\',sans-serif;">Nenhum registro para este filtro.</td></tr>';

    // formulário "+ Nova linha"
    var nlCtl = 'width:100%; padding:8px 10px; border:1px solid #dde2e8; border-radius:7px; font-size:13px;';
    function nlField(label, ctl) { return '<div><label style="display:block; font-size:11px; font-weight:600; color:#4b5563; margin-bottom:5px;">' + label + '</label>' + ctl + '</div>'; }

      } else if (!session) {
        nl = '<div style="background:#fdf2dc; border:1px solid #f0d79a; border-radius:8px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; color:#7a5410; display:flex; align-items:center; gap:10px; justify-content:space-between;"><span>Entre na sua conta para salvar novos registros.</span><button data-act="login" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;">Entrar</button></div>';
      } else {
        var animalOpts = model.animais.map(function (a) {
          var g = null, i; for (i = 0; i < model.grupos.length; i++) if (model.grupos[i].id === a.grupo_id) g = model.grupos[i];
          return '<option value="' + a.id + '">' + a.identificador + (g ? ' · ' + g.nome : '') + '</option>';

            nlField('Progesterona (ng/mL)', '<input id="nl-prog" inputmode="decimal" placeholder="—" style="' + nlCtl + '">') +
            nlField('Ovulação', '<select id="nl-ovul" style="' + nlCtl + '"><option value="">—</option><option value="sim">Sim</option><option value="nao">Não</option></select>') +
            '<div style="display:flex; gap:8px;"><button data-act="salvarLinha" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12.5px \'IBM Plex Sans\',sans-serif; padding:9px 14px; border-radius:7px; cursor:pointer;">Salvar</button><button data-act="cancelarLinha" style="border:1px solid #dde2e8; background:#fff; color:#566071; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:9px 12px; border-radius:7px; cursor:pointer;">Cancelar</button></div>' +
          '</div></div>';
      }
    }

    return '<div>' +
      '<div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px;"><div><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Gestão de dados</h2><div style="font-size:12.5px; color:#6b7585; font-family:\'IBM Plex Mono\',monospace;">Coleta ' + (d.curDia || 'D6') + ' · ' + displayed.length + ' registros · formatação condicional ativa</div></div><div style="display:flex; gap:8px;"><button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;">Importar CSV</button><button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;">Exportar</button><button data-act="novaLinha" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 14px; border-radius:7px; cursor:pointer;">+ Nova linha</button></div></div>' +

      '</div>' +

  // ------------------------------------------------------- screen: cronograma
  function cronograma() {
    var dows = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'].map(function (x) {
      return '<div style="text-align:center; font:600 10px \'IBM Plex Mono\',monospace; color:#aab2bd;">' + x + '</div>';
    }).join('');
    var cells = d.calCells.map(function (c) {
      var inner = '';
      if (c.today) inner += '<span style="width:26px; height:26px; border-radius:50%; background:#2f63d6; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600;">' + c.label + '</span>';
      else if (c.label) inner += '<span style="color:#3a4250;">' + c.label + '</span>';
      if (c.dot) inner += '<span style="width:5px; height:5px; border-radius:50%; position:absolute; bottom:5px; background:' + c.dot + ';"></span>';
      return '<div style="aspect-ratio:1/1; border-radius:7px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; position:relative; font:500 12.5px \'IBM Plex Mono\',monospace;">' + inner + '</div>';

      { animal: 'Égua 03', grupo: 'Controle', dia: 'D6', diam: '22,0', prog: '1,2', ps: pill(ok), ovul: 'Não', ovOk: false, tone: 'ok' },
      { animal: 'Égua 04', grupo: 'GnRH', dia: 'D6', diam: '30,5', prog: '2,8', ps: pill(ok), ovul: 'Sim', ovOk: true, tone: 'ok' },
      { animal: 'Égua 05', grupo: 'eCG', dia: 'D6', diam: '45,1', prog: '9,2', ps: pill(crit), ovul: 'Sim', ovOk: true, tone: 'crit' },
      { animal: 'Égua 06', grupo: 'Controle', dia: 'D6', diam: '21,3', prog: '0,8', ps: pill(crit), ovul: 'Não', ovOk: false, tone: 'crit' },
      { animal: 'Égua 07', grupo: 'GnRH', dia: 'D6', diam: '31,7', prog: '3,0', ps: pill(ok), ovul: 'Sim', ovOk: true, tone: 'ok' },
      { animal: 'Égua 08', grupo: 'Controle', dia: 'D6', diam: '23,6', prog: '1,5', ps: pill(ok), ovul: 'Não', ovOk: false, tone: 'ok' },
      { animal: 'Égua 09', grupo: 'eCG', dia: 'D6', diam: '38,9', prog: '4,7', ps: pill(warn), ovul: 'Sim', ovOk: true, tone: 'warn' }
    ].map(function (r) { r.ovStyle = r.ovOk ? { background: '#e7f6ee', color: '#177a52' } : { background: '#eef1f4', color: '#6b7585' }; return r; });

    var done = [17, 19, 21];
    var calCells = [{ empty: true }], dd;
    for (dd = 1; dd <= 30; dd++) {
      var dot = null;
      if (done.indexOf(dd) !== -1) dot = '#1f9d6b';
      if (dd === 25) dot = '#2f63d6';
      if (dd === 27) dot = '#94a3b8';
      if (dd === 30) dot = '#d99a18';
      calCells.push({ label: String(dd), today: dd === 23, notToday: dd !== 23, dot: dot });
    }
    while (calCells.length < 35) calCells.push({ empty: true, notToday: true });

    var step = state.step;
    var wizSteps = ['Identificação', 'Grupos & animais', 'Variáveis', 'Frequência', 'Revisão'].map(function (label, i) {
      var circle = i < step ? { background: '#1f9d6b', color: '#fff' } : i === step ? { background: '#2f63d6', color: '#fff' } : { background: '#e9ecf0', color: '#8a93a0' };
      return {
        label: label, num: String(i + 1),
        cstyle: css({ width: '26px', height: '26px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '12px', fontWeight: 600, flex: 'none', cursor: 'pointer', fontFamily: "'IBM Plex Mono',monospace", background: circle.background, color: circle.color }),
        lstyle: css({ fontSize: '12.5px', fontWeight: i === step ? 600 : 500, color: i === step ? '#1b1f27' : '#8a93a0', cursor: 'pointer' })
      };
    });

    var wizVars = [
      { name: 'Diâmetro folicular', type: 'Numérico', unit: 'mm', range: '25 – 40', cond: true },
      { name: 'Progesterona', type: 'Numérico', unit: 'ng/mL', range: '1 – 4', cond: true },
      { name: 'Ovulação', type: 'Booleano', unit: '—', range: '—', cond: false },
      { name: 'Escore de muco', type: 'Categórico', unit: '1 – 5', range: '—', cond: false }
    ].map(function (v) { v.notCond = !v.cond; return v; });

    d = {
      userName: isOri ? 'Marina Costa' : 'Prof. Rui Alencar',
      userInit: isOri ? 'MC' : 'RA',
      userRole: isOri ? 'DOUTORANDA' : 'ORIENTADOR',
      activity: [
        { t: 'Coleta D6 registrada — 24 amostras', w: 'há 2 h', c: '#1f9d6b' },
        { t: 'Progesterona acima do esperado em Égua 05', w: 'há 5 h', c: '#d99a18' },
        { t: 'Cronograma atualizado: D8 em 25 jun', w: 'ontem', c: '#2f63d6' },
        { t: 'Dados D4 validados pelo orientador', w: 'há 2 dias', c: '#8a93a0' }
      ],
      tPend: [
        { t: 'Coleta D8 — ultrassom folicular', due: '25 jun', pr: 'Alta', prc: crit },
        { t: 'Dosagem de progesterona (lote 3)', due: '27 jun', pr: 'Média', prc: warn }
      ],
      tProg: [
        { t: 'Análise estatística parcial (ANOVA)', due: '24 jun', pr: 'Alta', prc: crit },
        { t: 'Revisar planilha de dados D6', due: '24 jun', pr: 'Média', prc: warn }
      ],
      tDone: [
        { t: 'Coleta D6 — 24 amostras', due: '23 jun' },
        { t: 'Setup do experimento', due: '15 jun' },
        { t: 'Definição de variáveis', due: '14 jun' }
      ],
      researches: researches,
      alerts: [
        { tone: '#c0392b', bg: '#fdecec', t: 'Pedro Lima — coleta D4 atrasada 3 dias', w: 'há 1 h' },
        { tone: '#d99a18', bg: '#fdf2dc', t: 'Marina Costa — variabilidade alta no Grupo eCG', w: 'há 3 h' },
        { tone: '#2f63d6', bg: '#eaf1fd', t: 'João Reis — novo conjunto de dados aguardando validação', w: 'ontem' }
      ],
      allDataRows: dataRows,
      statRows: [
        { g: 'Controle', n: '8', mean: '24,1', sd: '2,3', cv: '9,5%', cvs: pill(ok), st: 'Normal', stc: '#177a52', dot: '#1f9d6b', rowbg: 'transparent' },
        { g: 'eCG', n: '8', mean: '35,2', sd: '5,8', cv: '16,5%', cvs: pill(warn), st: 'Alta variabilidade', stc: '#9a6a12', dot: '#d99a18', rowbg: '#fffdf6' },
        { g: 'GnRH', n: '8', mean: '31,0', sd: '3,1', cv: '10,0%', cvs: pill(ok), st: 'Normal', stc: '#177a52', dot: '#1f9d6b', rowbg: 'transparent' }
      ],
      calCells: calCells,
      events: [
        { d: '23', m: 'jun', label: 'Coleta D6 — ultrassom folicular', tag: 'Coleta', tagc: { background: '#eaf1fd', color: '#1d4ed8' }, note: 'Hoje · 08:00' },
        { d: '25', m: 'jun', label: 'Coleta D8 — ultrassom + progesterona', tag: 'Coleta', tagc: { background: '#eaf1fd', color: '#1d4ed8' }, note: 'Em 2 dias' },
        { d: '27', m: 'jun', label: 'Dosagem de progesterona (lote 3)', tag: 'Laboratório', tagc: { background: '#eef1f4', color: '#566071' }, note: '08:00 – 12:00' },
        { d: '30', m: 'jun', label: 'Entrega — relatório parcial', tag: 'Prazo', tagc: { background: '#fdf2dc', color: '#9a6a12' }, note: 'Para o orientador' }
      ],
      wizSteps: wizSteps,
      wizVars: wizVars,
      // valores de fallback (mock) — sobrescritos por applyModel quando há banco
      nRegistros: '9', nAnimais: '24', nGrupos: '3', curDia: 'D6',
      anovaP: 'p<0,001', anovaSig: true,
      ovBars: [
        { label: 'Controle', val: 58, color: '#94a3b8', valColor: '#7a8492' },
        { label: 'eCG', val: 86, color: '#2f63d6', valColor: '#2f63d6' },
        { label: 'GnRH', val: 74, color: '#1f9d6b', valColor: '#1f9d6b' }
      ],
      insightGrupo: 'eCG', insightBase: 'Controle', insightPct: 73,
      grupoChips: ['Todos', 'Controle', 'eCG', 'GnRH'],
      anomalia: '<strong>Anomalia detectada:</strong> Égua 05 (eCG) com progesterona <strong>9,2 ng/mL</strong> — acima da faixa esperada. Verifique a coleta ou registre observação clínica.'
    };

    if (model) applyModel(d);
  }

  // ----------------------------------------- sobrepõe d com dados do banco
  function applyModel(dd) {
    function byId(arr, id) { for (var i = 0; i < arr.length; i++) if (arr[i].id === id) return arr[i]; return null; }
    var vByChave = {}; model.variaveis.forEach(function (v) { vByChave[v.chave] = v; });
    var valByColeta = {}; model.valores.forEach(function (x) { (valByColeta[x.coleta_id] = valByColeta[x.coleta_id] || {})[x.variavel_id] = x; });
    var diasSet = {}; model.coletas.forEach(function (c) { diasSet[c.dia] = true; });
    var diaList = Object.keys(diasSet).sort();
    var curDia = diaList[diaList.length - 1] || 'D6';
    var vDiam = vByChave.diam_folicular, vProg = vByChave.progesterona, vOvul = vByChave.ovulacao;

    var rows = [];
    model.coletas.forEach(function (c) {
      if (c.dia !== curDia) return;
      var an = byId(model.animais, c.animal_id); if (!an) return;
      var g = byId(model.grupos, an.grupo_id);
      var vals = valByColeta[c.id] || {};
      var diam = (vDiam && vals[vDiam.id] && vals[vDiam.id].valor_num != null) ? Number(vals[vDiam.id].valor_num) : null;
      var prog = (vProg && vals[vProg.id] && vals[vProg.id].valor_num != null) ? Number(vals[vProg.id].valor_num) : null;
      var ovb = (vOvul && vals[vOvul.id]) ? vals[vOvul.id].valor_bool : null;
      var t = classify(prog, vProg);
      rows.push({
        animal: an.identificador, grupo: g ? g.nome : '—', dia: c.dia,
        diam: fmt(diam, 1), prog: fmt(prog, 1), ps: pill(t), tone: toneName(t),
        ovul: ovb === true ? 'Sim' : (ovb === false ? 'Não' : '—'),
        ovStyle: ovb ? { background: '#e7f6ee', color: '#177a52' } : { background: '#eef1f4', color: '#6b7585' }
      });
    });
    rows.sort(function (a, b) { return a.animal.localeCompare(b.animal); });
    dd.allDataRows = rows;
    dd.curDia = curDia;
    dd.nRegistros = String(model.coletas.length);
    dd.nAnimais = String(model.animais.length);
    dd.nGrupos = String(model.grupos.length);
    dd.grupoChips = ['Todos'].concat(model.grupos.map(function (g) { return g.nome; }));

    // estatística por grupo (diâmetro folicular no dia atual)
    var groupVals = model.grupos.map(function (g) {
      var arr = [];
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var an = byId(model.animais, c.animal_id); if (!an || an.grupo_id !== g.id) return;
        var vv = valByColeta[c.id] || {};
        if (vDiam && vv[vDiam.id] && vv[vDiam.id].valor_num != null) arr.push(Number(vv[vDiam.id].valor_num));
      });
      return { g: g, vals: arr };
    });
    dd.statRows = groupVals.map(function (gv) {
      var m = mean(gv.vals), s = sd(gv.vals), cv = m ? (s / m * 100) : 0;
      var normal = cv <= 12;
      return { g: gv.g.nome, n: String(gv.vals.length), mean: fmt(m, 1), sd: fmt(s, 1), cv: fmt(cv, 1) + '%', cvs: pill(normal ? ok : warn), st: normal ? 'Normal' : 'Alta variabilidade', stc: normal ? '#177a52' : '#9a6a12', dot: normal ? '#1f9d6b' : '#d99a18', rowbg: normal ? 'transparent' : '#fffdf6', _cv: cv };
    });
    var an = anova(groupVals.filter(function (g) { return g.vals.length > 1; }).map(function (g) { return g.vals; }));
    dd.anovaP = an.p < 0.001 ? 'p<0,001' : 'p=' + fmt(an.p, 3);
    dd.anovaSig = an.p < 0.05;

    dd.ovBars = model.grupos.map(function (g) {
      var t = 0, n = 0;
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var an2 = byId(model.animais, c.animal_id); if (!an2 || an2.grupo_id !== g.id) return;
        var vv = valByColeta[c.id] || {};
        if (vOvul && vv[vOvul.id] && vv[vOvul.id].valor_bool != null) { n++; if (vv[vOvul.id].valor_bool) t++; }
      });
      return { label: g.nome, val: n ? Math.round(t / n * 100) : 0, color: g.cor, valColor: g.cor };
    });

    // insight: grupo de maior CV vs. baseline (Controle, se houver)
    if (dd.statRows.length) {
      var base = null, i;
      for (i = 0; i < dd.statRows.length; i++) if (dd.statRows[i].g === 'Controle') base = dd.statRows[i];
      if (!base) base = dd.statRows[0];
      var maxr = dd.statRows[0];
      for (i = 1; i < dd.statRows.length; i++) if (dd.statRows[i]._cv > maxr._cv) maxr = dd.statRows[i];
      dd.insightGrupo = maxr.g; dd.insightBase = base.g;
      dd.insightPct = (base._cv > 0) ? Math.round((maxr._cv / base._cv - 1) * 100) : 0;
    }

    // anomalia real: maior valor de progesterona fora da faixa
    if (vProg) {
      var worst = null;
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var vv = valByColeta[c.id] || {};
        if (!(vProg && vv[vProg.id] && vv[vProg.id].valor_num != null)) return;
        var val = Number(vv[vProg.id].valor_num);
        if (toneName(classify(val, vProg)) === 'crit') {
          if (!worst || val > worst.val) {
            var an3 = byId(model.animais, c.animal_id), g3 = an3 ? byId(model.grupos, an3.grupo_id) : null;
            worst = { val: val, animal: an3 ? an3.identificador : '—', grupo: g3 ? g3.nome : '' };
          }
        }
      });
      if (worst) dd.anomalia = '<strong>Anomalia detectada:</strong> ' + worst.animal + (worst.grupo ? ' (' + worst.grupo + ')' : '') + ' com progesterona <strong>' + fmt(worst.val, 1) + ' ng/mL</strong> — fora da faixa esperada. Verifique a coleta ou registre observação clínica.';
    }
  }

  // ------------------------------------------------------------ data layer
  async function loadModel() {
    if (!sb) return;
    try {
      var pq = await sb.from('reqlab_pesquisas').select('*').eq('is_demo', true).order('created_at').limit(1);
      if (pq.error) throw pq.error;
      var pesquisa = pq.data && pq.data[0];
      if (!pesquisa) { console.warn('ReqLab: pesquisa demo não encontrada — rode sql/001_schema.sql.'); return; }
      var pid = pesquisa.id;
      var res = await Promise.all([
        sb.from('reqlab_grupos').select('*').eq('pesquisa_id', pid).order('ordem'),
        sb.from('reqlab_variaveis').select('*').eq('pesquisa_id', pid).order('ordem'),
        sb.from('reqlab_animais').select('*').eq('pesquisa_id', pid).order('ordem'),
        sb.from('reqlab_coletas').select('*').eq('pesquisa_id', pid)
      ]);
      for (var i = 0; i < res.length; i++) if (res[i].error) throw res[i].error;
      var coletas = res[3].data || [];
      var coletaIds = coletas.map(function (c) { return c.id; });
      var valores = [];
      if (coletaIds.length) {
        var vr = await sb.from('reqlab_valores').select('*').in('coleta_id', coletaIds);
        if (vr.error) throw vr.error; valores = vr.data || [];
      }
      model = { pesquisa: pesquisa, grupos: res[0].data || [], variaveis: res[1].data || [], animais: res[2].data || [], coletas: coletas, valores: valores };
      render();
    } catch (e) { console.error('ReqLab loadModel:', (e && e.message) || e); }
  }

  async function salvarLinha() {
    if (!sb || !model) return;
    if (!session) { state.loginOpen = true; state.loginStep = 'email'; state.loginMsg = ''; render(); return; }
    var animalId = (document.getElementById('nl-animal') || {}).value;
    if (!animalId) { alert('Selecione um animal.'); return; }
    var dia = ((document.getElementById('nl-dia') || {}).value || '').trim() || (d.curDia || 'D6');
    var diam = ((document.getElementById('nl-diam') || {}).value || '').trim();
    var prog = ((document.getElementById('nl-prog') || {}).value || '').trim();
    var ovul = ((document.getElementById('nl-ovul') || {}).value || '');
    var today = new Date().toISOString().slice(0, 10);
    var ins = await sb.from('reqlab_coletas').insert({ pesquisa_id: model.pesquisa.id, animal_id: animalId, dia: dia, data: today }).select().single();
    if (ins.error) { alert('Erro ao salvar coleta: ' + ins.error.message); return; }
    var cid = ins.data.id, vch = {}; model.variaveis.forEach(function (v) { vch[v.chave] = v; });
    var vrows = [];
    if (diam !== '' && vch.diam_folicular) vrows.push({ coleta_id: cid, variavel_id: vch.diam_folicular.id, valor_num: parseFloat(diam.replace(',', '.')) });
    if (prog !== '' && vch.progesterona) vrows.push({ coleta_id: cid, variavel_id: vch.progesterona.id, valor_num: parseFloat(prog.replace(',', '.')) });
    if (ovul !== '' && vch.ovulacao) vrows.push({ coleta_id: cid, variavel_id: vch.ovulacao.id, valor_bool: (ovul === 'sim') });
    if (vrows.length) { var vi = await sb.from('reqlab_valores').insert(vrows); if (vi.error) alert('Erro ao salvar valores: ' + vi.error.message); }
    state.novaLinhaOpen = false;
    await loadModel();
  }

  async function doLoginEnviar() {
    if (!sb) { state.loginMsg = 'Backend não configurado.'; render(); return; }
    var em = ((document.getElementById('lg-email') || {}).value || '').trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { state.loginMsg = 'E-mail inválido.'; render(); return; }
    state.loginMsg = 'Enviando…'; render();
    var r = await sb.auth.signInWithOtp({ email: em, options: { shouldCreateUser: true } });
    if (r.error) { state.loginMsg = r.error.message || 'Erro ao enviar.'; render(); return; }
    state.loginEmail = em; state.loginStep = 'code'; state.loginMsg = ''; render();
  }
  async function doLoginVerificar() {
    if (!sb) return;
    var code = ((document.getElementById('lg-code') || {}).value || '').trim();
    if (!/^\d{4,8}$/.test(code)) { state.loginMsg = 'Código inválido.'; render(); return; }
    state.loginMsg = 'Verificando…'; render();
    var r = await sb.auth.verifyOtp({ email: state.loginEmail, token: code, type: 'email' });
    if (r.error || !r.data.user) { state.loginMsg = (r.error && r.error.message) || 'Código inválido.'; render(); return; }
    session = r.data.session; state.loginOpen = false; state.loginStep = 'email'; state.loginMsg = '';
    render(); loadModel();
  }
  async function doLogout() { if (sb) { try { await sb.auth.signOut(); } catch (e) {} } session = null; render(); }

  // ----------------------------------------------------------------- render
  function screenBody() {
    switch (state.screen) {
      case 'visao': return state.profile === 'orientado' ? visaoOrientado() : visaoOrientador();
      case 'analises': return analises();
      case 'dados': return dados();
      case 'cronograma': return cronograma();
      case 'tarefas': return tarefas();
      case 'config': return config();
      default: return '';
    }
  }
  function render() {
    buildData();
    var html = '<div style="display:flex; min-height:100vh; font-family:\'IBM Plex Sans\',sans-serif; color:#1b1f27; background:#f5f7f9;">' +
      sidebar() +
      '<main style="flex:1; min-width:0; display:flex; flex-direction:column;">' +
        topbar() +
        '<div style="padding:24px 26px; flex:1;">' + screenBody() + '</div>' +
      '</main>' +
    '</div>' + loginModal();
    document.getElementById('app').innerHTML = html;
  }

  // ----------------------------------------------------------------- events
  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest ? e.target.closest('[data-act]') : null;
    if (!el) return;
    var act = el.getAttribute('data-act');
    if (act === 'noop') return;
    if (act === 'salvarLinha') { salvarLinha(); return; }
    if (act === 'loginEnviar') { doLoginEnviar(); return; }
    if (act === 'loginVerificar') { doLoginVerificar(); return; }
    if (act === 'logout') { doLogout(); return; }
    if (act === 'go') state.screen = el.getAttribute('data-screen');
    else if (act === 'prof') state.profile = el.getAttribute('data-profile');
    else if (act === 'step') state.step = parseInt(el.getAttribute('data-step'), 10);
    else if (act === 'wizNext') state.step = Math.min(4, state.step + 1);
    else if (act === 'wizPrev') state.step = Math.max(0, state.step - 1);
    else if (act === 'novaLinha') state.novaLinhaOpen = !state.novaLinhaOpen;
    else if (act === 'cancelarLinha') state.novaLinhaOpen = false;
    else if (act === 'filtro') state.dataFiltro = el.getAttribute('data-grupo');
    else if (act === 'login') { state.loginOpen = true; state.loginStep = 'email'; state.loginMsg = ''; }
    else if (act === 'loginFechar') { state.loginOpen = false; state.loginMsg = ''; }
    render();
  });

  // ------------------------------------------------------------------- boot
  (async function () {
    if (sb) { try { var r = await sb.auth.getSession(); session = r.data.session; } catch (e) {} }
    render();
    loadModel();
  })();
})();

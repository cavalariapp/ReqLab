  // ------------------------------------------------------ estatística real
  function mean(a) { var s = 0, i; for (i = 0; i < a.length; i++) s += a[i]; return a.length ? s / a.length : 0; }
  function sd(a) { if (a.length < 2) return 0; var m = mean(a), s = 0, i; for (i = 0; i < a.length; i++) s += (a[i] - m) * (a[i] - m); return Math.sqrt(s / (a.length - 1)); }
  function fmt(n, dgt) { if (n == null || isNaN(n)) return '—'; var p = Math.pow(10, dgt); return (Math.round(n * p) / p).toFixed(dgt).replace('.', ','); }
  function lgamma(x) {
    var c = [76.18009172947146, -86.50532032941677, 24.01409824083091, -1.231739572450155, 0.1208650973866179e-2, -0.5395239384953e-5];
    var y = x, t = x + 5.5, j; t -= (x + 0.5) * Math.log(t);
    var s = 1.000000000190015; for (j = 0; j < 6; j++) { y++; s += c[j] / y; }
    return -t + Math.log(2.5066282746310005 * s / x);
  }
  function betacf(a, b, x) {
    var MAXIT = 200, EPS = 3e-12, FPMIN = 1e-300;
    var qab = a + b, qap = a + 1, qam = a - 1, c = 1, d = 1 - qab * x / qap, m, m2, aa, del, h;
    if (Math.abs(d) < FPMIN) d = FPMIN; d = 1 / d; h = d;
    for (m = 1; m <= MAXIT; m++) {
      m2 = 2 * m; aa = m * (b - m) * x / ((qam + m2) * (a + m2));
      d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN; c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN; d = 1 / d; h *= d * c;
      aa = -(a + m) * (qab + m) * x / ((a + m2) * (qap + m2));
      d = 1 + aa * d; if (Math.abs(d) < FPMIN) d = FPMIN; c = 1 + aa / c; if (Math.abs(c) < FPMIN) c = FPMIN; d = 1 / d; del = d * c; h *= del;
      if (Math.abs(del - 1) < EPS) break;
    }
    return h;
  }
  function ibeta(x, a, b) {
    if (x <= 0) return 0; if (x >= 1) return 1;
    var bt = Math.exp(lgamma(a + b) - lgamma(a) - lgamma(b) + a * Math.log(x) + b * Math.log(1 - x));
    if (x < (a + 1) / (a + b + 2)) return bt * betacf(a, b, x) / a;
    return 1 - bt * betacf(b, a, 1 - x) / b;
  }
  // ANOVA de uma via -> { F, p, df1, df2 }
  function anova(groups) {
    var k = groups.length, N = 0, grand = 0, ssb = 0, ssw = 0;
    groups.forEach(function (g) { g.forEach(function (v) { N++; grand += v; }); });
    if (k < 2 || N <= k) return { F: 0, p: 1, df1: 0, df2: 0 };
    grand /= N;
    groups.forEach(function (g) { var m = mean(g); ssb += g.length * (m - grand) * (m - grand); g.forEach(function (v) { ssw += (v - m) * (v - m); }); });
    var df1 = k - 1, df2 = N - k, msb = ssb / df1, msw = ssw / df2;
    var F = msw > 0 ? msb / msw : 0;
    var p = (df2 > 0 && F > 0) ? ibeta(df2 / (df2 + df1 * F), df2 / 2, df1 / 2) : 1;
    return { F: F, p: p, df1: df1, df2: df2 };
  }
  // formatação condicional dirigida pela config da variável
  function classify(v, varc) {
    if (v == null || !varc || varc.faixa_min == null || varc.faixa_max == null) return ok;
    var lo = Number(varc.faixa_min), hi = Number(varc.faixa_max), span = hi - lo;
    if (v >= lo && v <= hi) return ok;
    if (v >= lo - 0.5 * span && v <= hi + 0.5 * span) return warn;
    return crit;
  }
  function toneName(t) { return t === crit ? 'crit' : (t === warn ? 'warn' : 'ok'); }

    var pend = d.tPend.map(function (t) {

    }).join('');
    return '<div>' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Bom dia, Marina.</h2><div style="font-size:13px; color:#6b7585;">Efeito de eCG e GnRH na dinâmica folicular de éguas · Doutorado</div></div>' +

  function kpi(label, value, sub, subColor, subWeight, valColor) {

        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:16px 18px;"><div style="font-size:14px; font-weight:600; margin-bottom:13px;">Alertas e anomalias</div><div style="display:flex; flex-direction:column; gap:11px;">' + alerts + '</div></div>' +
      '</div>' +
    '</div>';

  // --------------------------------------------------------- screen: análises
  function analises() {
    if (model && d.real) return analisesReal();
    if (session) return emptyTela('Análises', 'Crie ou importe um experimento para ver as análises estatísticas.', true);
    var stat = d.statRows.map(function (s) {
      return '<tr style="border-top:1px solid #f0f3f6; background:' + s.rowbg + ';"><td style="padding:10px 16px; font-family:\'IBM Plex Sans\',sans-serif; font-weight:600;">' + s.g + '</td><td style="padding:10px 12px;">' + s.n + '</td><td style="padding:10px 12px;">' + s.mean + '</td><td style="padding:10px 12px;">' + s.sd + '</td><td style="padding:10px 12px;"><span style="' + s.cvs + '">' + s.cv + '</span></td><td style="padding:10px 16px;"><span style="display:inline-flex; align-items:center; gap:6px; font:500 11.5px \'IBM Plex Sans\',sans-serif; color:' + s.stc + ';"><span style="width:7px; height:7px; border-radius:50%; background:' + s.dot + ';"></span>' + s.st + '</span></td></tr>';

      '<div style="display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:14px;">' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Registros coletados</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">' + d.nRegistros + '</div><div style="font-size:11px; color:#1f9d6b; font-weight:600;">▲ 18 esta semana</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Animais em estudo</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">' + d.nAnimais + '</div><div style="font-size:11px; color:#7a8492;">' + d.nGrupos + ' grupos</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">Próxima coleta</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px;">2 dias</div><div style="font-size:11px; color:#7a8492;">D8 · 25 jun</div></div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:13px 14px;"><div style="font-size:11.5px; color:#7a8492; font-weight:500;">ANOVA · diâm. folicular</div><div style="font:600 26px/1.1 \'IBM Plex Mono\',monospace; margin:6px 0 4px; color:#1d4ed8;">' + d.anovaP + '</div><div style="font-size:11px; color:' + (d.anovaSig ? '#1f9d6b' : '#7a8492') + '; font-weight:600;">' + (d.anovaSig ? 'diferença significativa' : 'sem diferença significativa') + '</div></div>' +
      '</div>' +
      '<div style="display:grid; grid-template-columns:1.4fr 1fr; gap:12px; margin-bottom:14px;">' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:14px 16px;">' +
          '<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><div style="font-size:13px; font-weight:600;">Evolução do diâmetro folicular (mm)</div><div style="display:flex; gap:13px; font:500 11px \'IBM Plex Sans\',sans-serif;"><span style="display:flex; align-items:center; gap:5px; color:#6b7585;"><span style="width:9px; height:3px; border-radius:2px; background:#94a3b8;"></span>Controle</span><span style="display:flex; align-items:center; gap:5px; color:#6b7585;"><span style="width:9px; height:3px; border-radius:2px; background:#2f63d6;"></span>eCG</span><span style="display:flex; align-items:center; gap:5px; color:#6b7585;"><span style="width:9px; height:3px; border-radius:2px; background:#1f9d6b;"></span>GnRH</span></div></div>' +
          '<svg viewBox="0 0 300 132" style="width:100%; height:auto; display:block;"><line x1="0" y1="24" x2="300" y2="24" stroke="#eef1f4"/><line x1="0" y1="60" x2="300" y2="60" stroke="#eef1f4"/><line x1="0" y1="96" x2="300" y2="96" stroke="#eef1f4"/><line x1="0" y1="120" x2="300" y2="120" stroke="#e3e7ec"/><polyline points="15,112 82,101 150,89 218,74 285,66" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="15,109 82,93 150,70 218,43 285,24" fill="none" stroke="#2f63d6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/><polyline points="15,112 82,97 150,82 218,59 285,39" fill="none" stroke="#1f9d6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="285" cy="24" r="3" fill="#2f63d6"/><circle cx="285" cy="39" r="3" fill="#1f9d6b"/><circle cx="285" cy="66" r="3" fill="#94a3b8"/></svg>' +
          '<div style="display:flex; justify-content:space-between; font:500 10.5px \'IBM Plex Mono\',monospace; color:#9aa3b0; margin-top:6px; padding:0 4px;"><span>D0</span><span>D2</span><span>D4</span><span>D6</span><span>D8</span></div>' +
        '</div>' +
        '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; padding:14px 16px;"><div style="font-size:13px; font-weight:600; margin-bottom:14px;">Taxa de ovulação por grupo (%)</div><div style="display:flex; align-items:flex-end; gap:16px; height:118px;">' + bars + '</div></div>' +

      '</div>' +

  function ovBar(label, val, color, valColor) {

  }

  // ------------------------------------------------------------ screen: dados
  function dados() {
    if (model && d.real) return dadosReal();
    if (session) return emptyTela('Dados', 'Crie um experimento para registrar e visualizar os dados aqui.', true);
    var f = state.dataFiltro || 'Todos';
    var displayed = (f === 'Todos') ? d.allDataRows : d.allDataRows.filter(function (r) { return r.grupo === f; });
    var rows = displayed.map(function (r) {
      return '<tr style="border-top:1px solid #f0f3f6;"><td style="padding:10px 16px; font-family:\'IBM Plex Sans\',sans-serif; font-weight:600;">' + r.animal + '</td><td style="padding:10px 12px; color:#566071;">' + r.grupo + '</td><td style="padding:10px 12px; color:#8a93a0;">' + r.dia + '</td><td style="padding:10px 12px;">' + r.diam + '</td><td style="padding:10px 12px;"><span style="' + r.ps + '">' + r.prog + '</span></td><td style="padding:10px 16px;"><span style="font:600 11px \'IBM Plex Sans\',sans-serif; padding:3px 9px; border-radius:5px; background:' + r.ovStyle.background + '; color:' + r.ovStyle.color + ';">' + r.ovul + '</span></td></tr>';
    }).join('');
    if (!rows) rows = '<tr><td colspan="6" style="padding:18px 16px; text-align:center; color:#9aa3b0; font-family:\'IBM Plex Sans\',sans-serif;">Nenhum registro para este filtro.</td></tr>';

    var chips = d.grupoChips.map(function (c) {
      var on = (f === c);
      if (on) return '<span data-act="filtro" data-grupo="' + c + '" style="font-size:11.5px; font-weight:500; padding:6px 11px; border-radius:20px; background:#2f63d6; color:#fff; cursor:pointer;">' + c + '</span>';
      return '<span data-act="filtro" data-grupo="' + c + '" style="font-size:11.5px; font-weight:500; padding:6px 11px; border-radius:20px; background:#fff; border:1px solid #dde2e8; color:#566071; cursor:pointer;">' + c + '</span>';
    }).join('');
    function legend(c, b, label) {
      return '<span style="display:flex; align-items:center; gap:6px;"><span style="width:10px; height:10px; border-radius:3px; background:' + c + '; border:1px solid ' + b + ';"></span>' + label + '</span>';
    }

    // contagem real de alertas/críticos sobre o que está na tela
    var nA = 0, nC = 0;
    d.allDataRows.forEach(function (r) { if (r.tone === 'warn') nA++; else if (r.tone === 'crit') nC++; });
    var footL = displayed.length + ' de ' + d.nRegistros + ' registros · coleta ' + (d.curDia || 'D6');

    // formulário "+ Nova linha"
    var nlCtl = 'width:100%; padding:8px 10px; border:1px solid #dde2e8; border-radius:7px; font-size:13px;';
    function nlField(label, ctl) { return '<div><label style="display:block; font-size:11px; font-weight:600; color:#4b5563; margin-bottom:5px;">' + label + '</label>' + ctl + '</div>'; }
    var nl = '';
    if (state.novaLinhaOpen) {
      if (!model) {
        nl = '<div style="background:#eaf1fd; border:1px solid #d3e0fa; border-radius:8px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; color:#1c3a78;">Conecte o Supabase (preencha <strong>SUPABASE_URL</strong> e <strong>SUPABASE_KEY</strong> no topo do script e rode <strong>sql/001_schema.sql</strong>) para adicionar registros reais.</div>';
      } else if (!session) {
        nl = '<div style="background:#fdf2dc; border:1px solid #f0d79a; border-radius:8px; padding:12px 14px; margin-bottom:12px; font-size:12.5px; color:#7a5410; display:flex; align-items:center; gap:10px; justify-content:space-between;"><span>Entre na sua conta para salvar novos registros.</span><button data-act="login" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;">Entrar</button></div>';
      } else {
        var animalOpts = model.animais.map(function (a) {
          var g = null, i; for (i = 0; i < model.grupos.length; i++) if (model.grupos[i].id === a.grupo_id) g = model.grupos[i];
          return '<option value="' + a.id + '">' + a.identificador + (g ? ' · ' + g.nome : '') + '</option>';
        }).join('');
        nl = '<div style="background:#fff; border:1px solid #d3e0fa; border-radius:8px; padding:14px 16px; margin-bottom:12px;">' +
          '<div style="display:grid; grid-template-columns:1.5fr 0.7fr 1fr 1fr 0.9fr auto; gap:10px; align-items:end;">' +
            nlField('Animal', '<select id="nl-animal" style="' + nlCtl + '">' + animalOpts + '</select>') +
            nlField('Dia', '<input id="nl-dia" value="' + (d.curDia || 'D6') + '" style="' + nlCtl + '">') +
            nlField('Diâm. folicular (mm)', '<input id="nl-diam" inputmode="decimal" placeholder="—" style="' + nlCtl + '">') +
            nlField('Progesterona (ng/mL)', '<input id="nl-prog" inputmode="decimal" placeholder="—" style="' + nlCtl + '">') +
            nlField('Ovulação', '<select id="nl-ovul" style="' + nlCtl + '"><option value="">—</option><option value="sim">Sim</option><option value="nao">Não</option></select>') +
            '<div style="display:flex; gap:8px;"><button data-act="salvarLinha" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12.5px \'IBM Plex Sans\',sans-serif; padding:9px 14px; border-radius:7px; cursor:pointer;">Salvar</button><button data-act="cancelarLinha" style="border:1px solid #dde2e8; background:#fff; color:#566071; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:9px 12px; border-radius:7px; cursor:pointer;">Cancelar</button></div>' +
          '</div></div>';
      }
    }

    return '<div>' +
      '<div style="display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:16px;"><div><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Gestão de dados</h2><div style="font-size:12.5px; color:#6b7585; font-family:\'IBM Plex Mono\',monospace;">Coleta ' + (d.curDia || 'D6') + ' · ' + displayed.length + ' registros · formatação condicional ativa</div></div><div style="display:flex; gap:8px;"><button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;" data-act="importarCSV">Importar CSV</button><input type="file" id="reqlab-csv" accept=".csv,text/csv" style="display:none"><button style="border:1px solid #dde2e8; background:#fff; color:#2b3340; font:500 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 12px; border-radius:7px; cursor:pointer;" data-act="exportarCSV">Exportar</button><button data-act="novaLinha" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 12.5px \'IBM Plex Sans\',sans-serif; padding:7px 14px; border-radius:7px; cursor:pointer;">+ Nova linha</button></div></div>' +

        '<div style="display:flex; gap:6px;">' + chips + '</div>' +
        '<div style="margin-left:auto; display:flex; align-items:center; gap:14px; font:500 11px \'IBM Plex Mono\',monospace; color:#8a93a0;">' + legend('#e7f6ee', '#b9e3cd', 'normal') + legend('#fdf2dc', '#f0d79a', 'alerta') + legend('#fdecec', '#f2c3bc', 'crítico') + '</div>' +
      '</div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:8px; overflow:hidden;">' +
        '<table style="width:100%; border-collapse:collapse; font-size:12.5px;"><thead><tr style="color:#8a93a0; text-align:left; font:600 10.5px \'IBM Plex Mono\',monospace; letter-spacing:0.04em; background:#fafbfc;"><th style="padding:10px 16px; font-weight:600;">ANIMAL</th><th style="padding:10px 12px; font-weight:600;">GRUPO</th><th style="padding:10px 12px; font-weight:600;">DIA</th><th style="padding:10px 12px; font-weight:600;">DIÂM. FOLICULAR (mm)</th><th style="padding:10px 12px; font-weight:600;">PROGESTERONA (ng/mL)</th><th style="padding:10px 16px; font-weight:600;">OVULAÇÃO</th></tr></thead><tbody style="font-family:\'IBM Plex Mono\',monospace;">' + rows + '</tbody></table>' +
        '<div style="display:flex; align-items:center; justify-content:space-between; padding:11px 16px; border-top:1px solid #eef1f4; font:500 11.5px \'IBM Plex Mono\',monospace; color:#8a93a0;"><span>' + footL + '</span><span style="color:#9a6a12;">' + footR + '</span></div>' +

  // ------------------------------------------------------- screen: cronograma
  function cronograma() {

  // ----------------------------------------- sobrepõe d com dados do banco
  function applyModel(dd) {
    function byId(arr, id) { for (var i = 0; i < arr.length; i++) if (arr[i].id === id) return arr[i]; return null; }
    var vByChave = {}; model.variaveis.forEach(function (v) { vByChave[v.chave] = v; });
    var valByColeta = {}; model.valores.forEach(function (x) { (valByColeta[x.coleta_id] = valByColeta[x.coleta_id] || {})[x.variavel_id] = x; });
    var diasSet = {}; model.coletas.forEach(function (c) { diasSet[c.dia] = true; });
    var diaList = Object.keys(diasSet).sort();
    var curDia = diaList[diaList.length - 1] || 'D6';
    var vDiam = vByChave.diam_folicular, vProg = vByChave.progesterona, vOvul = vByChave.ovulacao;

    var rows = [];
    model.coletas.forEach(function (c) {
      if (c.dia !== curDia) return;
      var an = byId(model.animais, c.animal_id); if (!an) return;
      var g = byId(model.grupos, an.grupo_id);
      var vals = valByColeta[c.id] || {};
      var diam = (vDiam && vals[vDiam.id] && vals[vDiam.id].valor_num != null) ? Number(vals[vDiam.id].valor_num) : null;
      var prog = (vProg && vals[vProg.id] && vals[vProg.id].valor_num != null) ? Number(vals[vProg.id].valor_num) : null;
      var ovb = (vOvul && vals[vOvul.id]) ? vals[vOvul.id].valor_bool : null;
      var t = classify(prog, vProg);
      rows.push({
        animal: an.identificador, grupo: g ? g.nome : '—', dia: c.dia,
        diam: fmt(diam, 1), prog: fmt(prog, 1), ps: pill(t), tone: toneName(t),
        ovul: ovb === true ? 'Sim' : (ovb === false ? 'Não' : '—'),
        ovStyle: ovb ? { background: '#e7f6ee', color: '#177a52' } : { background: '#eef1f4', color: '#6b7585' }
      });
    });
    rows.sort(function (a, b) { return a.animal.localeCompare(b.animal); });
    dd.allDataRows = rows;
    dd.curDia = curDia;
    dd.nRegistros = String(model.coletas.length);
    dd.nAnimais = String(model.animais.length);
    dd.nGrupos = String(model.grupos.length);
    dd.grupoChips = ['Todos'].concat(model.grupos.map(function (g) { return g.nome; }));

    // estatística por grupo (diâmetro folicular no dia atual)
    var groupVals = model.grupos.map(function (g) {
      var arr = [];
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var an = byId(model.animais, c.animal_id); if (!an || an.grupo_id !== g.id) return;
        var vv = valByColeta[c.id] || {};
        if (vDiam && vv[vDiam.id] && vv[vDiam.id].valor_num != null) arr.push(Number(vv[vDiam.id].valor_num));
      });
      return { g: g, vals: arr };
    });
    dd.statRows = groupVals.map(function (gv) {
      var m = mean(gv.vals), s = sd(gv.vals), cv = m ? (s / m * 100) : 0;
      var normal = cv <= 12;
      return { g: gv.g.nome, n: String(gv.vals.length), mean: fmt(m, 1), sd: fmt(s, 1), cv: fmt(cv, 1) + '%', cvs: pill(normal ? ok : warn), st: normal ? 'Normal' : 'Alta variabilidade', stc: normal ? '#177a52' : '#9a6a12', dot: normal ? '#1f9d6b' : '#d99a18', rowbg: normal ? 'transparent' : '#fffdf6', _cv: cv };
    });
    var an = anova(groupVals.filter(function (g) { return g.vals.length > 1; }).map(function (g) { return g.vals; }));
    dd.anovaP = an.p < 0.001 ? 'p<0,001' : 'p=' + fmt(an.p, 3);
    dd.anovaSig = an.p < 0.05;

    dd.ovBars = model.grupos.map(function (g) {
      var t = 0, n = 0;
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var an2 = byId(model.animais, c.animal_id); if (!an2 || an2.grupo_id !== g.id) return;
        var vv = valByColeta[c.id] || {};
        if (vOvul && vv[vOvul.id] && vv[vOvul.id].valor_bool != null) { n++; if (vv[vOvul.id].valor_bool) t++; }
      });
      return { label: g.nome, val: n ? Math.round(t / n * 100) : 0, color: g.cor, valColor: g.cor };
    });

    // insight: grupo de maior CV vs. baseline (Controle, se houver)
    if (dd.statRows.length) {
      var base = null, i;
      for (i = 0; i < dd.statRows.length; i++) if (dd.statRows[i].g === 'Controle') base = dd.statRows[i];
      if (!base) base = dd.statRows[0];
      var maxr = dd.statRows[0];
      for (i = 1; i < dd.statRows.length; i++) if (dd.statRows[i]._cv > maxr._cv) maxr = dd.statRows[i];
      dd.insightGrupo = maxr.g; dd.insightBase = base.g;
      dd.insightPct = (base._cv > 0) ? Math.round((maxr._cv / base._cv - 1) * 100) : 0;
    }

    // anomalia real: maior valor de progesterona fora da faixa
    if (vProg) {
      var worst = null;
      model.coletas.forEach(function (c) {
        if (c.dia !== curDia) return;
        var vv = valByColeta[c.id] || {};
        if (!(vProg && vv[vProg.id] && vv[vProg.id].valor_num != null)) return;
        var val = Number(vv[vProg.id].valor_num);
        if (toneName(classify(val, vProg)) === 'crit') {
          if (!worst || val > worst.val) {
            var an3 = byId(model.animais, c.animal_id), g3 = an3 ? byId(model.grupos, an3.grupo_id) : null;
            worst = { val: val, animal: an3 ? an3.identificador : '—', grupo: g3 ? g3.nome : '' };
          }

    var cores = ['#94a3b8', '#2f63d6', '#1f9d6b', '#d99a18', '#9b59b6', '#e67e22', '#16a085', '#c0392b'];
    try {
      var r = await sb.from('reqlab_grupos').insert({ pesquisa_id: model.pesquisa.id, nome: nome, cor: cores[model.grupos.length % cores.length], ordem: model.grupos.length });
      if (r.error) throw r.error; await loadModel();
    } catch (e) { alert('Erro: ' + ((e && e.message) || e)); }
  }
  async function adicionarIndividuo() {
    if (!model) return;
    var nome = campo('ai-nome'); if (!nome) { alert('Digite o nome do indivíduo.'); return; }
    var gid = campo('ai-grupo') || null;
    try {
      var r = await sb.from('reqlab_animais').insert({ pesquisa_id: model.pesquisa.id, grupo_id: gid, identificador: nome, ordem: model.animais.length });
      if (r.error) throw r.error; await loadModel();
    } catch (e) { alert('Erro: ' + ((e && e.message) || e)); }
  }

  // -------------------------------------------------- tela Pesquisas (todas)
  function pesquisas() {
    function linha(p) {
      var on = model && model.pesquisa.id === p.id;
      var editavel = meu(p) || ehOrientador();
      return '<div data-act="abrirExp" data-id="' + p.id + '" style="display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border:1px solid ' + (on ? '#2f63d6' : '#e9ecf0') + '; border-radius:9px; cursor:pointer; background:' + (on ? '#f5f8ff' : '#fff') + '; margin-bottom:8px;">' +
        '<div style="min-width:0;"><div style="font-size:13.5px; font-weight:600;">' + esc(p.titulo) + '</div><div style="font:500 11px \'IBM Plex Mono\',monospace; color:#8a93a0; margin-top:2px;">' + esc(nomeDono(p.owner)) + (meu(p) ? ' · você' : '') + '</div></div>' +
        '<span style="font:600 10px \'IBM Plex Mono\',monospace; color:' + (editavel ? '#177a52' : '#8a93a0') + '; background:' + (editavel ? '#e7f6ee' : '#f0f2f5') + '; padding:4px 9px; border-radius:20px;">' + (editavel ? 'editável' : 'leitura') + '</span>' +
      '</div>';
    }
    var meus = experiments.filter(function (p) { return meu(p); });
    var outros = experiments.filter(function (p) { return !meu(p); });
    var bloco = function (titulo, arr) {
      if (!arr.length) return '';
      return '<div style="font:600 11px \'IBM Plex Mono\',monospace; color:#8a93a0; letter-spacing:0.05em; margin:6px 0 10px;">' + titulo + '</div>' + arr.map(linha).join('');
    };
    var vazio = !experiments.length ? '<div style="background:#fff; border:1px dashed #cfd6df; border-radius:10px; padding:28px; text-align:center; color:#6b7585; font-size:13px;">Ainda não há experimentos no laboratório.</div>' : '';
    return '<div style="max-width:760px; margin:0 auto;">' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Pesquisas do laboratório</h2><div style="font-size:13px; color:#6b7585;">Veja os experimentos de todos. Você edita os seus; os demais abrem para leitura' + (ehOrientador() ? ' (como orientador, você edita todos)' : '') + '.</div></div>' +
      vazio + bloco('SEUS EXPERIMENTOS', meus) + (outros.length ? '<div style="height:10px;"></div>' : '') + bloco('OUTROS PESQUISADORES', outros) +
    '</div>';
  }

  // -------------------------------------------------- tela Usuários (orientador)
  function usuarios() {
    var cs = 'width:100%; padding:9px 11px; border:1px solid #dde2e8; border-radius:7px; font-size:13px; box-sizing:border-box; margin-bottom:10px;';
    var orientados = perfisAll.filter(function (p) { return p.papel === 'orientado'; });
    var lista = orientados.map(function (p) {
      return '<div style="display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid #f0f3f6;"><div style="width:30px; height:30px; border-radius:50%; background:#dde4ee; color:#3a4658; display:flex; align-items:center; justify-content:center; font:600 12px \'IBM Plex Sans\',sans-serif;">' + esc((p.nome || '—').slice(0, 2).toUpperCase()) + '</div><div style="font-size:13px; font-weight:500;">' + esc(p.nome || '—') + '</div></div>';
    }).join('') || '<div style="font-size:12.5px; color:#9aa3b0; padding:8px 0;">Nenhum orientado cadastrado ainda.</div>';
    return '<div style="max-width:620px; margin:0 auto;">' +
      '<div style="margin-bottom:18px;"><h2 style="margin:0 0 3px; font-size:20px; font-weight:700;">Usuários</h2><div style="font-size:13px; color:#6b7585;">Cadastre os orientados. Eles entram com o e-mail e a senha que você definir.</div></div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:18px 20px; margin-bottom:14px;">' +
        '<div style="font-size:14px; font-weight:600; margin-bottom:12px;">Novo orientado</div>' +
        '<input id="or-nome" placeholder="Nome" style="' + cs + '">' +
        '<input id="or-email" type="email" placeholder="e-mail" style="' + cs + '">' +
        '<input id="or-senha" type="text" placeholder="senha (mín. 6 caracteres)" style="' + cs + '">' +
        (state.usrMsg ? '<div style="font-size:12.5px; color:' + (/criado/i.test(state.usrMsg) ? '#177a52' : '#c0392b') + '; margin-bottom:10px;">' + esc(state.usrMsg) + '</div>' : '') +
        '<div style="display:flex; justify-content:flex-end;"><button data-act="criarOrientado" style="border:1px solid #2f63d6; background:#2f63d6; color:#fff; font:600 13px \'IBM Plex Sans\',sans-serif; padding:9px 18px; border-radius:8px; cursor:pointer;">Criar orientado</button></div>' +
      '</div>' +
      '<div style="background:#fff; border:1px solid #e9ecf0; border-radius:10px; padding:16px 20px;"><div style="font-size:14px; font-weight:600; margin-bottom:4px;">Orientados (' + orientados.length + ')</div>' + lista + '</div>' +
    '</div>';
  }

  async function criarOrientado() {
    var nome = campo('or-nome'), email = campo('or-email'), senha = (document.getElementById('or-senha') || {}).value || '';
    if (!email || !senha) { state.usrMsg = 'Informe e-mail e senha.'; render(); return; }
    if (senha.length < 6) { state.usrMsg = 'A senha precisa ter ao menos 6 caracteres.'; render(); return; }
    state.usrMsg = 'Criando…'; render();
    try {
      var r = await sb.functions.invoke('criar-orientado', { body: { nome: nome, email: email, password: senha } });
      if (r.error) {
        var emsg = r.error.message || 'Falha na função.';
        try { var body = await r.error.context.json(); if (body && body.error) emsg = body.error; } catch (_) {}
        state.usrMsg = 'Erro: ' + emsg; render(); return;
      }
      if (r.data && r.data.error) { state.usrMsg = 'Erro: ' + r.data.error; render(); return; }
      state.usrMsg = 'Orientado criado: ' + email;
      await carregarPerfil(); render();
    } catch (e) { state.usrMsg = 'Erro: ' + ((e && e.message) || e); render(); }
  }

  async function salvarFaixas() {
    if (!model) return;
    try {
      var numericas = model.variaveis.filter(function (v) { return v.tipo === 'numerico'; });
      for (var i = 0; i < numericas.length; i++) {
        var v = numericas[i];
        var mn = numBR((document.getElementById('cf-min-' + v.id) || {}).value);
        var mx = numBR((document.getElementById('cf-max-' + v.id) || {}).value);
        var on = !!(document.getElementById('cf-on-' + v.id) || {}).checked;
        var up = await sb.from('reqlab_variaveis').update({ faixa_min: mn, faixa_max: mx, cond_format: on && mn != null && mx != null }).eq('id', v.id);
        if (up.error) throw up.error;
      }
      await loadModel();
    } catch (e) { alert('Erro ao salvar faixas: ' + ((e && e.message) || e)); }
  }

  // ----------------------------------------------------------------- render
  function screenBody() {
    switch (state.screen) {
      case 'visao': return session ? (model ? visaoReal() : onboarding()) : (state.profile === 'orientado' ? visaoOrientado() : visaoOrientador());
      case 'pesquisas': return session ? pesquisas() : (state.profile === 'orientado' ? visaoOrientado() : visaoOrientador());
      case 'usuarios': return session && ehOrientador() ? usuarios() : emptyTela('Usuários', 'Apenas o orientador pode gerenciar usuários.', false);
      case 'analises': return analises();
      case 'dados': return dados();
      case 'cronograma': return session ? emptyTela('Cronograma', 'Os prazos e coletas aparecem aqui. Em breve o orientador poderá cadastrar tarefas e você será avisado.', false) : cronograma();
      case 'tarefas': return session ? emptyTela('Tarefas', 'Suas tarefas e prazos aparecem aqui. Em breve o orientador poderá cadastrá-las e você recebe aviso.', false) : tarefas();
      case 'config': return config();
      default: return '';
    }
  }
  function render() {
    buildData();
    var html = '<div style="display:flex; min-height:100vh; font-family:\'IBM Plex Sans\',sans-serif; color:#1b1f27; background:#f5f7f9;">' +
      sidebar() +
      '<main style="flex:1; min-width:0; display:flex; flex-direction:column;">' +
        topbar() +
        '<div style="padding:24px 26px; flex:1;">' + screenBody() + '</div>' +
      '</main>' +
    '</div>' + loginModal() + novoExpModal();
    document.getElementById('app').innerHTML = html;
    if (state.editCell) { var ei = document.getElementById('edit-input'); if (ei) { ei.focus(); if (ei.select) ei.select(); } }
  }

  // ----------------------------------------------------------------- events
  document.getElementById('app').addEventListener('click', function (e) {
    var el = e.target.closest ? e.target.closest('[data-act]') : null;
    if (!el) return;
    var act = el.getAttribute('data-act');
    if (act === 'noop') return;
    if (act === 'salvarLinha') { salvarLinha(); return; }
    if (act === 'salvarLinhaReal') { salvarLinhaReal(); return; }
    if (act === 'importarCSV') { var inp = document.getElementById('reqlab-csv'); if (inp) inp.click(); return; }
    if (act === 'exportarCSV') { exportarCSV(); return; }
    if (act === 'criarExp') { criarExperimento(); return; }
    if (act === 'excluirExp') { excluirExperimento(); return; }
    if (act === 'salvarFaixas') { salvarFaixas(); return; }
    if (act === 'trocarExp') { state.pesquisaId = el.getAttribute('data-id'); loadModel(); return; }
    if (act === 'abrirExp') { state.pesquisaId = el.getAttribute('data-id'); state.screen = 'dados'; state.dataFiltro = 'Todos'; state.tempoFiltro = 'Todos'; loadModel(); return; }
    if (act === 'criarOrientado') { criarOrientado(); return; }
    if (act === 'editCell') { state.editCell = { coletaId: el.getAttribute('data-coleta'), varId: el.getAttribute('data-var') }; render(); return; }
    if (act === 'delVar') { excluirVariavel(el.getAttribute('data-id')); return; }
    if (act === 'delTempo') { excluirTempo(el.getAttribute('data-t')); return; }
    if (act === 'delIndiv') { excluirIndividuo(el.getAttribute('data-id')); return; }
    if (act === 'delGrupo') { excluirGrupo(el.getAttribute('data-id')); return; }
    if (act === 'addVar') { adicionarVariavel(); return; }
    if (act === 'addTempo') { adicionarTempo(); return; }
    if (act === 'addGrupo') { adicionarGrupo(); return; }
    if (act === 'addIndiv') { adicionarIndividuo(); return; }
    if (act === 'loginEntrar') { doLoginEntrar(); return; }
    if (act === 'logout') { doLogout(); return; }
    if (act === 'go') state.screen = el.getAttribute('data-screen');
    else if (act === 'prof') state.profile = el.getAttribute('data-profile');
    else if (act === 'step') state.step = parseInt(el.getAttribute('data-step'), 10);
    else if (act === 'wizNext') state.step = Math.min(4, state.step + 1);
    else if (act === 'wizPrev') state.step = Math.max(0, state.step - 1);
    else if (act === 'novaLinha') { var sc = el.getAttribute('data-screen'); if (sc) { state.screen = sc; state.novaLinhaOpen = true; } else state.novaLinhaOpen = !state.novaLinhaOpen; }
    else if (act === 'cancelarLinha') state.novaLinhaOpen = false;
    else if (act === 'filtro') state.dataFiltro = el.getAttribute('data-grupo');
    else if (act === 'tempo') state.tempoFiltro = el.getAttribute('data-tempo');
    else if (act === 'varFiltro') state.varFiltro = el.getAttribute('data-var');
    else if (act === 'anVar') state.anVar = el.getAttribute('data-var');
    else if (act === 'anGrupo') state.anGrupo = el.getAttribute('data-grupo');
    else if (act === 'login') { state.loginOpen = true; state.loginMsg = ''; }
    else if (act === 'loginFechar') { state.loginOpen = false; state.loginMsg = ''; }
    else if (act === 'novoExp') { state.novoExpOpen = true; ensureExpForm(); state.expMsg = ''; }
    else if (act === 'expFechar') { state.novoExpOpen = false; state.expMsg = ''; }
    else if (act === 'expAddGrupo') { snapshotExpForm(); state.expForm.grupos.push({ nome: '', n: '' }); }
    else if (act === 'expDelGrupo') { snapshotExpForm(); state.expForm.grupos.splice(parseInt(el.getAttribute('data-i'), 10), 1); }
    else if (act === 'expAddVar') { snapshotExpForm(); state.expForm.vars.push({ nome: '', tipo: 'numerico', unidade: '', min: '', max: '' }); }
    else if (act === 'expDelVar') { snapshotExpForm(); state.expForm.vars.splice(parseInt(el.getAttribute('data-i'), 10), 1); }
    render();
  });

  // seleção de arquivo CSV (input escondido dentro de #app)
  document.getElementById('app').addEventListener('change', function (e) {
    var t = e.target; if (!t) return;
    if (t.id === 'reqlab-csv') {
      var f = t.files && t.files[0];
      if (f) importarCSV(f);
      t.value = '';
    } else if (t.id === 'exp-select') {
      state.pesquisaId = t.value; loadModel();
    } else if (t.id === 'edit-input') {
      salvarCelula(t.value);
    } else if (/^ef-v-tipo-/.test(t.id)) {
      snapshotExpForm(); render();
    }
  });

  // salvar célula ao sair do campo (clique fora). salvarCelula é idempotente.
  document.getElementById('app').addEventListener('focusout', function (e) {
    if (e.target && e.target.id === 'edit-input' && state.editCell) salvarCelula(e.target.value);
  });

  // Enter envia o login; Esc fecha o modal
  document.getElementById('app').addEventListener('keydown', function (e) {
    if (e.target && e.target.id === 'edit-input') {
      if (e.key === 'Enter') { e.preventDefault(); salvarCelula(e.target.value); }
      else if (e.key === 'Escape') { e.preventDefault(); state.editCell = null; render(); }
      return;
    }
    if (!state.loginOpen) return;
    if (e.key === 'Enter') { e.preventDefault(); doLoginEntrar(); }
    else if (e.key === 'Escape') { state.loginOpen = false; state.loginMsg = ''; render(); }
  });

  // ------------------------------------------------------------------- boot
  (async function () {
    if (sb) { try { var r = await sb.auth.getSession(); session = r.data.session; } catch (e) {} }
    await carregarPerfil();
    render();
    loadModel();
  })();
})();
</script>
</body>
</html>
